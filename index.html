<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lively Parallax Wallpaper</title>
  
  <!-- Linking your CSS stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="parallax-container">
    <div class="parallax-layer layer-bg" data-depth="0"></div>
    <div class="parallax-layer layer-01" data-depth="0.4"></div>
    <div class="parallax-layer layer-02" data-depth="0.5"></div>
    <div class="parallax-layer layer-03" data-depth="0.6"></div>
    <div class="parallax-layer layer-04" data-depth="0.7"></div>
    <div class="parallax-layer layer-05" data-depth="0.8"></div>
    <div class="parallax-layer layer-06" data-depth="0.9"></div>
    <div class="parallax-layer layer-07" data-depth="1"></div>
    
  </div>

  <!-- Linking your JavaScript logic at the very bottom -->
  <script src="script.js" defer></script>
</body>
</html>
